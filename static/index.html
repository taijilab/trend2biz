<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trend2Biz · GitHub Trending Dashboard</title>
  <link rel="stylesheet" href="/web/style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">Trend2Biz</span>
      <span id="version-badge" class="version-badge"></span>
      <span class="subtitle">GitHub Trending · 商业分析</span>
    </div>
    <div class="header-right">
      <a href="/docs" target="_blank" class="api-link">API Docs</a>
      <button id="btn-jobs" class="settings-icon-btn" title="后台任务" style="margin-right:4px">&#128197;</button>
      <button id="btn-settings" class="settings-icon-btn" title="设置">&#9881;</button>
    </div>
  </header>

  <div class="controls">
    <div class="date-nav">
      <button id="btn-prev" class="nav-btn" title="前一天">&#8249;</button>
      <input type="date" id="date-input" class="date-input">
      <button id="btn-next" class="nav-btn" title="后一天">&#8250;</button>
    </div>
    <div class="since-group">
      <select id="since-select" class="since-select">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div class="lang-group">
      <select id="lang-select" class="lang-select" title="筛选编程语言">
        <option value="">全部语言</option>
        <option value="Python">Python</option>
        <option value="JavaScript">JavaScript</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Go">Go</option>
        <option value="Rust">Rust</option>
        <option value="Java">Java</option>
        <option value="C">C</option>
        <option value="C++">C++</option>
        <option value="C#">C#</option>
        <option value="Swift">Swift</option>
        <option value="Kotlin">Kotlin</option>
        <option value="Ruby">Ruby</option>
        <option value="PHP">PHP</option>
        <option value="Shell">Shell</option>
      </select>
    </div>

    <button id="btn-fetch" class="fetch-btn">
      &#9889; 抓取 Trending
    </button>
    <button id="btn-refresh" class="refresh-btn" title="刷新">&#8635;</button>
  </div>

  <div id="status-bar" class="status-bar" style="display:none"></div>

  <div id="content" class="content">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </div>

  <footer>
    <span id="footer-info">Trend2Biz · 数据来源 GitHub Trending</span>
  </footer>

  <script src="/web/app.js"></script>

  <!-- Settings Modal -->
  <div id="settings-modal" class="settings-modal" style="display:none">
    <div class="settings-box">
      <div class="settings-header">
        <span class="settings-title">&#9881; 设置</span>
        <button class="settings-close-btn" id="settings-close-btn" aria-label="关闭">&#10005;</button>
      </div>
      <div class="settings-body">
        <p id="settings-nokey-warn" class="settings-warn" style="display:none">
          &#9888; 未配置 API Key，无法生成 AI 中文描述。请选择提供商并填写 Key，保存后再点击「分析」。
        </p>
        <section class="settings-section">
          <h4 class="settings-section-title">AI 描述生成</h4>
          <div class="settings-field">
            <label for="settings-model">分析模型</label>
            <select id="settings-model" class="settings-select">
              <option value="rule-v1">rule-v1（规则匹配，无需 Key）</option>
              <option value="llm-v1">llm-v1（LLM 完整画像，需要 Key）</option>
            </select>
          </div>
          <div class="settings-field">
            <label for="settings-provider">提供商</label>
            <select id="settings-provider" class="settings-select">
              <option value="anthropic">Anthropic（Claude Haiku）</option>
              <option value="openrouter">OpenRouter（Deepseek-V3）</option>
              <option value="zhipu">智谱 AI（GLM-4-Flash）</option>
            </select>
          </div>
          <div class="settings-field">
            <label for="settings-api-key">API Key</label>
            <input type="text" id="settings-api-key" class="settings-input" placeholder="粘贴您的 API Key…" autocomplete="new-password" spellcheck="false">
          </div>
          <p class="settings-hint">llm-v1 可生成完整商业画像 + BD 话术。Key 仅存储在本地浏览器，不写入服务器。</p>
        </section>
        <section class="settings-section">
          <h4 class="settings-section-title">自动采集</h4>
          <label class="settings-toggle-row">
            <input type="checkbox" id="settings-auto-fetch" class="settings-checkbox">
            <span>每日自动采集今日 Trending</span>
          </label>
          <p class="settings-hint">开启后，访问当天且无数据时自动触发 GitHub Trending 采集。</p>
        </section>
      </div>
      <div class="settings-footer">
        <button id="settings-save-btn" class="settings-save-btn">保存设置</button>
      </div>
    </div>
  </div>

  <!-- Jobs Panel Modal -->
  <div id="jobs-modal" class="settings-modal" style="display:none">
    <div class="settings-box jobs-box">
      <div class="settings-header">
        <span class="settings-title">&#128197; 后台任务</span>
        <button class="settings-close-btn" id="jobs-close-btn" aria-label="关闭">&#10005;</button>
      </div>
      <div class="settings-body">
        <!-- Today summary -->
        <section class="settings-section">
          <h4 class="settings-section-title">今日任务汇总</h4>
          <div id="jobs-summary" class="jobs-summary">加载中…</div>
        </section>
        <!-- Scheduler next runs -->
        <section class="settings-section" id="jobs-sched-section" style="display:none">
          <h4 class="settings-section-title">定时计划 (UTC)</h4>
          <div id="jobs-schedule" class="jobs-schedule"></div>
        </section>
        <!-- Failed jobs -->
        <section class="settings-section">
          <h4 class="settings-section-title">失败任务 <span id="jobs-fail-count" class="jobs-fail-badge"></span></h4>
          <div id="jobs-fail-list" class="jobs-fail-list">—</div>
        </section>
      </div>
      <div class="settings-footer">
        <button id="jobs-refresh-btn" class="settings-save-btn">&#8635; 刷新</button>
      </div>
    </div>
  </div>

  <!-- BD Pitch Tooltip -->
  <div id="bd-tooltip" class="bd-tooltip" style="display:none"></div>

  <!-- Keyword Projects Modal -->
  <div id="kw-modal" class="kw-modal" aria-modal="true" role="dialog" style="display:none">
    <div class="kw-modal-box">
      <div class="kw-modal-header">
        <span id="kw-modal-title" class="kw-modal-title"></span>
        <button class="kw-modal-close" id="kw-modal-close" aria-label="关闭">&#10005;</button>
      </div>
      <div id="kw-modal-body" class="kw-modal-body"></div>
    </div>
  </div>
</body>
</html>
